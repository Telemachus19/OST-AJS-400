<div class="card shadow-sm border-danger border-opacity-50">
    <div class="card-header bg-danger text-white fw-bold py-3">
        <i class="bi bi-trash3 me-2"></i> Manage Product Removals
    </div>
    <div class="list-group list-group-flush">
        <div *ngFor="let product of products$ | async"
            class="list-group-item d-flex justify-content-between align-items-center p-3">
            <div>
                <h6 class="mb-0 fw-bold">{{ product.name }}</h6>
                <small class="text-muted">ID: {{ product.id }} | {{ product.category }}</small>
            </div>
            <button class="btn btn-outline-danger" (click)="onDelete(product.id, product.name)">
                Delete <i class="bi bi-x-circle ms-1"></i>
            </button>
        </div>

        <!-- Empty State -->
        <div *ngIf="(products$ | async)?.length === 0" class="p-4 text-center text-muted">
            No products available to delete.
        </div>
    </div>
</div>
