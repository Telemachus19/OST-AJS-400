<div class="card h-100 border-0 shadow-sm" appHoverEffect>
    <div [id]="'carousel-' + product.id" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button *ngFor="let img of product.imageUrls; let i = index" type="button"
                [attr.data-bs-target]="'#carousel-' + product.id" [attr.data-bs-slide-to]="i"
                [class.active]="i === 0"></button>
        </div>
        <div class="carousel-inner rounded-top">
            <div class="carousel-item" *ngFor="let img of product.imageUrls; let i = index" [class.active]="i === 0">
                <img [src]="img" class="d-block w-100 object-fit-cover" style="height: 220px;" alt="Product Image">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" [attr.data-bs-target]="'#carousel-' + product.id"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon bg-dark rounded-circle p-2" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" [attr.data-bs-target]="'#carousel-' + product.id"
            data-bs-slide="next">
            <span class="carousel-control-next-icon bg-dark rounded-circle p-2" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <div class="card-body d-flex flex-column">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title fw-bold mb-0">{{ product.name }}</h5>
            <span class="badge bg-primary fs-6">${{ product.price }}</span>
        </div>
        <span class="text-uppercase text-muted small fw-semibold mb-3">{{ product.category }}</span>

        <div class="mb-2">
            <span class="badge" [ngClass]="product.available > 0 ? 'bg-success' : 'bg-danger'">
                {{ product.available > 0 ? product.available + ' In Stock' : 'Out of Stock' }}
            </span>
        </div>

        <p class="card-text text-secondary flex-grow-1">
            {{ showFullDesc ? product.description : (product.description | truncate:3) }}
            <button class="btn btn-link btn-sm p-0 ms-1 text-decoration-none" (click)="toggleDesc()">
                {{ showFullDesc ? 'Show Less' : 'Read More' }}
            </button>
        </p>

        <div class="mt-3">
            <app-buy-button color="dark" [text]="product.available > 0 ? 'Add to Cart' : 'Out of Stock'"
                [disabled]="product.available === 0" (clicked)="onBuy()">
            </app-buy-button>
        </div>
    </div>
</div>
