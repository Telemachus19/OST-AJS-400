<div class="card h-100 border-0 shadow-sm" appHoverEffect>
    <div class="overflow-hidden position-relative" style="height: 200px;">
        <img [src]="product.imageUrl" class="card-img-top h-100 w-100 object-fit-cover" [alt]="product.name">
        <div class="position-absolute top-0 end-0 m-2">
            <span class="badge rounded-pill bg-light text-dark shadow-sm">
                {{ product.category }}
            </span>
        </div>
    </div>

    <div class="card-body d-flex flex-column">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title mb-0 text-truncate" style="max-width: 70%;">
                {{ product.name }}
            </h5>
            <span class="text-success fw-bold fs-5">
                {{ product.price | currency }}
            </span>
        </div>

        <p class="card-text flex-grow-1 text-secondary small">
            <ng-container *ngIf="!isExpanded; else fullDesc">
                {{ product.description | truncateWords:3 }}
                <button type="button" class="btn btn-link p-0 pb-1 small fw-bold text-decoration-none"
                    (click)="toggleDescription()">
                    read more
                </button>
            </ng-container>

            <ng-template #fullDesc>
                {{ product.description }}
                <button type="button" class="btn btn-link p-0 pb-1 small fw-bold text-decoration-none"
                    (click)="toggleDescription()">
                    show less
                </button>
            </ng-template>
        </p>

        <div class="mt-3">
            <app-buy-button title="Add to Cart" color="dark" (action)="onBuy()">
            </app-buy-button>
        </div>
    </div>
</div>
